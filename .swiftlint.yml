included:
  - PoochyDiary
  - PoochyDiaryTests
  - PoochyDiaryUITests

excluded:
  - output
  - tmp

opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - empty_count
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - toggle_bool

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 140

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2

reporter: xcode
